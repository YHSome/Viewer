<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="x-viewer-page-id" content="2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二页 — Viewer 演示</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", "KaiTi", serif;
            overflow-x: hidden;
        }

        .sky {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, #1a3a3a 0%, #0a1a1a 60%, #030a0a 100%);
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay); opacity: 0;
        }
        @keyframes twinkle {
            0%,100% { opacity: .2; transform: scale(1); }
            50%     { opacity: 1;  transform: scale(1.3); }
        }

        .container {
            position: relative; z-index: 2;
            text-align: center;
            margin-top: 60px;
            padding: 50px 70px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 24px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0,0,0,.4);
            animation: fadeUp 1.5s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 2.2rem; color: #b8d8c8;
            letter-spacing: .4em; margin-bottom: 12px;
            text-shadow: 0 0 30px rgba(184,216,200,.2);
        }
        .subtitle {
            font-size: .95rem; color: #6a8a78;
            letter-spacing: .15em; margin-bottom: 36px;
        }
        .subtitle::after {
            content: ''; display: block;
            width: 50px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100,150,130,.4), transparent);
            margin: 14px auto 0;
        }

        .stats { display: flex; flex-direction: column; gap: 14px; }
        .stat-item {
            font-size: .9rem; color: #7a9088;
            letter-spacing: .1em;
        }
        .stat-value { color: #b8d8c8; font-weight: bold; }
        .back-link {
            display: inline-block; margin-top: 24px;
            font-size: .8rem; color: #5a7068;
            text-decoration: none; letter-spacing: .1em;
            transition: color .3s;
        }
        .back-link:hover { color: #b8d8c8; }

        /* 评论区 */
        .comment-section {
            position: relative; z-index: 2;
            width: 100%; max-width: 520px;
            margin: 30px auto 60px; padding: 36px 40px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 24px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0,0,0,.4);
            text-align: left;
        }
        .comment-section h2 {
            text-align: center;
            font-size: 1.2rem; color: #b8d8c8;
            letter-spacing: .2em; margin-bottom: 24px;
            font-weight: normal;
        }
        .comment-form { display: flex; flex-direction: column; gap: 12px; }
        .comment-form input, .comment-form textarea {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 10px;
            color: #d0e8d8; font-size: .9rem;
            font-family: inherit; outline: none;
            transition: border-color .3s;
        }
        .comment-form input:focus, .comment-form textarea:focus {
            border-color: rgba(150,200,170,.5);
        }
        .comment-form input::placeholder, .comment-form textarea::placeholder {
            color: rgba(150,170,160,.4);
        }
        .comment-form textarea { min-height: 80px; resize: vertical; }
        .comment-form button {
            align-self: flex-end; padding: 8px 28px;
            background: rgba(150,200,170,.12);
            border: 1px solid rgba(150,200,170,.2);
            border-radius: 20px;
            color: #b8d8c8; font-size: .9rem;
            cursor: pointer; letter-spacing: .1em;
            transition: all .3s;
        }
        .comment-form button:hover {
            background: rgba(150,200,170,.25);
            color: #e0f0e8;
        }
        .comment-list { margin-top: 28px; }
        .comment-item {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,.05);
        }
        .comment-item:last-child { border-bottom: none; }
        .comment-meta {
            display: flex; justify-content: space-between;
            align-items: baseline; margin-bottom: 6px;
        }
        .comment-name { font-size: .9rem; color: #b8d8c8; letter-spacing: .05em; }
        .comment-email { font-size: .75rem; color: #4a6058; margin-left: 6px; }
        .comment-time { font-size: .75rem; color: #4a6058; }
        .comment-content {
            font-size: .9rem; color: #8aa098;
            line-height: 1.6; word-break: break-word;
        }
        .comment-empty { text-align: center; color: #4a6058; font-size: .85rem; padding: 20px 0; }

        @media (max-width: 600px) {
            .container { padding: 35px 25px; margin: 15px; }
            .title { font-size: 1.5rem; }
            .comment-section { margin: 20px 10px 40px; padding: 24px 20px; }
        }
    </style>
</head>
<body>

    <div class="sky" id="sky"></div>

    <div class="container">
        <h1 class="title">第 二 页</h1>
        <p class="subtitle">多页面独立计数演示</p>
        <div class="stats">
            <p class="stat-item">页面打开次数：<span class="stat-value" id="counter">—</span></p>
            <p class="stat-item">独立访客数：<span class="stat-value" id="uniqueCounter">—</span></p>
        </div>
        <a class="back-link" href="index.html">← 返回首页</a>
    </div>

    <!-- 评论区 -->
    <div class="comment-section">
        <h2>第 二 页 留 言</h2>
        <form class="comment-form" id="commentForm">
            <input type="text" id="cmtName" placeholder="昵称" maxlength="20" required>
            <input type="email" id="cmtEmail" placeholder="邮箱（选填）" maxlength="60">
            <textarea id="cmtContent" placeholder="在第二页留言……" maxlength="500" required></textarea>
            <button type="submit">发 布</button>
        </form>
        <div class="comment-list" id="commentList">
            <p class="comment-empty">加载中...</p>
        </div>
    </div>

    <script>
        // 生成星星
        (function () {
            var sky = document.getElementById('sky');
            for (var i = 0; i < 100; i++) {
                var s = document.createElement('div');
                s.classList.add('star');
                var size = Math.random() * 2.5 + 1;
                s.style.width  = size + 'px';
                s.style.height = size + 'px';
                s.style.left    = Math.random() * 100 + '%';
                s.style.top     = Math.random() * 100 + '%';
                s.style.setProperty('--dur',   (Math.random() * 3 + 2) + 's');
                s.style.setProperty('--delay', (Math.random() * 4) + 's');
                sky.appendChild(s);
            }
        })();
    </script>

    <script src="counter.js"></script>
    <script src="unique.js"></script>
    <script src="comment.js"></script>
    <script>
        // 计数器
        getVisitCount()
            .then(function (n) { document.getElementById('counter').textContent = n; })
            .catch(function ()  { document.getElementById('counter').textContent = '—'; });

        // 独立访客
        Viewer.getUniqueCount()
            .then(function (r) { document.getElementById('uniqueCounter').textContent = r.count; })
            .catch(function ()  { document.getElementById('uniqueCounter').textContent = '—'; });

        // 评论
        var cmtList = document.getElementById('commentList');

        function formatTime(isoStr) {
            var d = new Date(isoStr);
            var pad = function (n) { return n < 10 ? '0' + n : n; };
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
                + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }
        function escapeHTML(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function renderComments(comments) {
            if (!comments || comments.length === 0) {
                cmtList.innerHTML = '<p class="comment-empty">暂无留言，来坐沙发 🛋️</p>';
                return;
            }
            var html = '';
            comments.forEach(function (c) {
                html +=
                    '<div class="comment-item">' +
                    '<div class="comment-meta">' +
                    '<span class="comment-name">' + escapeHTML(c.name) +
                    (c.email ? ' <span class="comment-email">' + escapeHTML(c.email) + '</span>' : '') +
                    '</span>' +
                    '<span class="comment-time">' + formatTime(c.time) + '</span>' +
                    '</div>' +
                    '<div class="comment-content">' + escapeHTML(c.content) + '</div>' +
                    '</div>';
            });
            cmtList.innerHTML = html;
        }

        Viewer.loadComments().then(renderComments).catch(function () {
            cmtList.innerHTML = '<p class="comment-empty">加载失败，请刷新重试</p>';
        });

        document.getElementById('commentForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var name = document.getElementById('cmtName').value.trim();
            var email = document.getElementById('cmtEmail').value.trim();
            var content = document.getElementById('cmtContent').value.trim();
            if (!name || !content) return;

            var btn = this.querySelector('button');
            btn.textContent = '提交中...';
            btn.disabled = true;

            Viewer.submitComment({ name: name, email: email, content: content }).then(function () {
                document.getElementById('cmtContent').value = '';
                btn.textContent = '已发布 ✓';
                setTimeout(function () { btn.textContent = '发 布'; btn.disabled = false; }, 2000);
                return Viewer.loadComments();
            }).then(renderComments).catch(function () {
                btn.textContent = '失败，重试';
                btn.disabled = false;
            });
        });
    </script>

</body>
</html>
