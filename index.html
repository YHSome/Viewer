<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="x-viewer-page-id" content="1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观者吟 — Viewer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", "KaiTi", serif;
            overflow-x: hidden;
        }

        /* 夜空背景 + 星星 */
        .sky {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, #0d1b3e 0%, #080d22 50%, #030614 100%);
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.3); }
        }

        /* 月亮 */
        .moon {
            position: absolute;
            top: 10%;
            right: 15%;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at 35% 35%, #fffaee, #e8d5a3 60%, #c4a44a);
            border-radius: 50%;
            box-shadow:
                0 0 80px 30px rgba(255, 250, 220, 0.25),
                0 0 200px 60px rgba(255, 250, 220, 0.08),
                0 0 400px 120px rgba(255, 250, 220, 0.04);
            animation: moonGlow 4s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 80px 30px rgba(255,250,220,0.25), 0 0 200px 60px rgba(255,250,220,0.08); }
            50%      { box-shadow: 0 0 100px 40px rgba(255,250,220,0.35), 0 0 240px 80px rgba(255,250,220,0.12); }
        }

        /* 月光洒落 */
        .moonlight {
            position: absolute;
            top: 10%;
            right: 15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,250,220,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 60px;
            padding: 60px 80px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            animation: fadeUp 1.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 2.6rem;
            color: #f0e6c8;
            letter-spacing: 0.4em;
            margin-bottom: 16px;
            text-shadow: 0 0 30px rgba(240, 230, 200, 0.3);
        }

        .author {
            font-size: 1.1rem;
            color: #b8a88a;
            letter-spacing: 0.2em;
            margin-bottom: 48px;
            position: relative;
        }

        .author::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,180,140,0.5), transparent);
            margin: 16px auto 0;
        }

        .poem {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .line {
            font-size: 1.8rem;
            color: #e8ddcc;
            letter-spacing: 0.25em;
            transition: all 0.4s ease;
            cursor: default;
            text-shadow: 0 0 10px rgba(232, 221, 204, 0.15);
        }

        .line:hover {
            color: #fff;
            text-shadow:
                0 0 20px rgba(255, 250, 220, 0.5),
                0 0 40px rgba(255, 250, 220, 0.2);
            transform: scale(1.04);
        }

        .counter {
            margin-top: 40px;
            font-size: 0.95rem;
            color: #7a7060;
            letter-spacing: 0.15em;
            position: relative;
        }

        .counter::before {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(150,140,120,0.4), transparent);
            margin: 0 auto 14px;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #7a7060;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }
        .github-link:hover {
            color: #f0e6c8;
            text-shadow: 0 0 12px rgba(255,250,220,0.2);
        }
        .github-icon {
            flex-shrink: 0;
        }

        /* 每句渐入 */
        .line:nth-child(1) { animation: fadeUp 0.8s ease-out 0.2s both; }
        .line:nth-child(2) { animation: fadeUp 0.8s ease-out 0.5s both; }
        .line:nth-child(3) { animation: fadeUp 0.8s ease-out 0.8s both; }
        .line:nth-child(4) { animation: fadeUp 0.8s ease-out 1.1s both; }

        /* ====== 评论区 ====== */
        .comment-section {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            margin: 30px auto 60px;
            padding: 36px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: left;
        }
        .comment-section h2 {
            text-align: center;
            font-size: 1.2rem;
            color: #c4b896;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
            font-weight: normal;
        }
        .comment-form { display: flex; flex-direction: column; gap: 12px; }
        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #e8ddcc;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .comment-form input:focus,
        .comment-form textarea:focus {
            border-color: rgba(200,180,140,0.5);
        }
        .comment-form input::placeholder,
        .comment-form textarea::placeholder {
            color: rgba(180,170,150,0.4);
        }
        .comment-form textarea { min-height: 80px; resize: vertical; }
        .comment-form button {
            align-self: flex-end;
            padding: 8px 28px;
            background: rgba(200,180,140,0.15);
            border: 1px solid rgba(200,180,140,0.25);
            border-radius: 20px;
            color: #c4b896;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }
        .comment-form button:hover {
            background: rgba(200,180,140,0.25);
            color: #f0e6c8;
        }
        .comment-list { margin-top: 28px; }
        .comment-item {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .comment-item:last-child { border-bottom: none; }
        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .comment-name {
            font-size: 0.9rem;
            color: #c4b896;
            letter-spacing: 0.05em;
        }
        .comment-email {
            font-size: 0.75rem;
            color: #5a5248;
            margin-left: 6px;
        }
        .comment-time {
            font-size: 0.75rem;
            color: #5a5248;
        }
        .comment-content {
            font-size: 0.9rem;
            color: #a09888;
            line-height: 1.6;
            word-break: break-word;
        }
        .comment-empty { text-align: center; color: #5a5248; font-size: 0.85rem; padding: 20px 0; }

        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 40px 30px; margin: 20px; }
            .title { font-size: 1.8rem; }
            .line { font-size: 1.3rem; }
            .moon { width: 100px; height: 100px; top: 6%; right: 8%; }
        }
    </style>
</head>
<body>

    <!-- 夜空 -->
    <div class="sky" id="sky"></div>

    <!-- 月光 -->
    <div class="moonlight"></div>

    <!-- 月亮 -->
    <div class="moon"></div>

    <!-- 诗歌 -->
    <div class="container">
        <h1 class="title">观 者 吟</h1>
        <p class="author">YHSome (feat.Claude)</p>
        <div class="poem">
            <p class="line">访客如水至，</p>
            <p class="line">一数记曾经。</p>
            <p class="line">云深藏岁月，</p>
            <p class="line">静夜伴繁星。</p>
        </div>
        <p class="counter">全站浏览量：<span id="globalCounter">—</span></p>
        <p class="counter">本页浏览量：<span id="counter">—</span></p>
        <p class="counter">本页访客数：<span id="uniqueCounter">—</span></p>
        <p style="margin-top:16px;">
            <a class="github-link" href="index1.html">查看第二页演示 →</a>
            <span style="color:#4a4038;margin:0 8px;">|</span>
            <a class="github-link" href="https://github.com/YHSome/Viewer" target="_blank" title="View on GitHub">
                <svg class="github-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHub
            </a>
        </p>
    </div>

    <!-- 评论区 -->
    <div class="comment-section">
        <h2>留 言</h2>
        <form class="comment-form" id="commentForm">
            <input type="text" id="cmtName" placeholder="昵称" maxlength="20" required>
            <input type="email" id="cmtEmail" placeholder="邮箱（选填）" maxlength="60">
            <textarea id="cmtContent" placeholder="说点什么……" maxlength="500" required></textarea>
            <button type="submit">发 布</button>
        </form>
        <div class="comment-list" id="commentList">
            <p class="comment-empty">加载中...</p>
        </div>
    </div>

    <script>
        // ========== 生成星星 ==========
        const sky = document.getElementById('sky');
        const STAR_COUNT = 120;

        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width  = size + 'px';
            star.style.height = size + 'px';
            star.style.left   = Math.random() * 100 + '%';
            star.style.top    = Math.random() * 100 + '%';
            star.style.setProperty('--dur',   (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--delay', (Math.random() * 4) + 's');
            sky.appendChild(star);
        }

    </script>
    <script src="js/global.js"></script>
    <script src="js/counter.js"></script>
    <script>
        Viewer.getGlobalCount()
            .then(n => { document.getElementById('globalCounter').textContent = n; })
            .catch(() => { document.getElementById('globalCounter').textContent = '—'; });
        getVisitCount()
            .then(n => { document.getElementById('counter').textContent = n; })
            .catch(() => { document.getElementById('counter').textContent = '—'; });
    </script>
    <script src="js/unique.js"></script>
    <script>
        Viewer.getUniqueCount()
            .then(r => { document.getElementById('uniqueCounter').textContent = r.count; })
            .catch(() => { document.getElementById('uniqueCounter').textContent = '—'; });
    </script>
    <script src="comment.js"></script>
    <script>
        // ========== 评论系统 ==========
        var cmtList = document.getElementById('commentList');
        var cmtForm = document.getElementById('commentForm');

        function formatTime(isoStr) {
            var d = new Date(isoStr);
            var pad = function (n) { return n < 10 ? '0' + n : n; };
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
                + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        function renderComments(comments) {
            if (!comments || comments.length === 0) {
                cmtList.innerHTML = '<p class="comment-empty">暂无留言，来坐沙发吧 🛋️</p>';
                return;
            }
            var html = '';
            comments.forEach(function (c) {
                html +=
                    '<div class="comment-item">' +
                    '<div class="comment-meta">' +
                    '<span class="comment-name">' + escapeHTML(c.name) +
                    (c.email ? ' <span class="comment-email">' + escapeHTML(c.email) + '</span>' : '') +
                    '</span>' +
                    '<span class="comment-time">' + formatTime(c.time) + '</span>' +
                    '</div>' +
                    '<div class="comment-content">' + escapeHTML(c.content) + '</div>' +
                    '</div>';
            });
            cmtList.innerHTML = html;
        }

        function escapeHTML(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 加载已有评论
        Viewer.loadComments().then(function (comments) {
            renderComments(comments);
        }).catch(function () {
            cmtList.innerHTML = '<p class="comment-empty">加载失败，请刷新重试</p>';
        });

        // 提交评论
        cmtForm.addEventListener('submit', function (e) {
            e.preventDefault();
            var name = document.getElementById('cmtName').value.trim();
            var email = document.getElementById('cmtEmail').value.trim();
            var content = document.getElementById('cmtContent').value.trim();
            if (!name || !content) return;

            var btn = cmtForm.querySelector('button');
            btn.textContent = '提交中...';
            btn.disabled = true;

            Viewer.submitComment({ name: name, email: email, content: content }).then(function () {
                document.getElementById('cmtContent').value = '';
                btn.textContent = '已发布 ✓';
                setTimeout(function () { btn.textContent = '发 布'; btn.disabled = false; }, 2000);
                // 重新加载
                return Viewer.loadComments();
            }).then(function (comments) {
                renderComments(comments);
            }).catch(function () {
                btn.textContent = '失败，重试';
                btn.disabled = false;
            });
        });
    </script>

</body>
</html>
